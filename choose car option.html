<html>
<head>
<link href="choose car option.css">
<style>
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: #e2d5b4;
  background:
    radial-gradient(at 0% 0, #fffa, #fff0 50%),
    radial-gradient(at 100% 100%, #0002, #0000 50%),
    repeating-linear-gradient(transparent 0 13%, #ffffff08 0 calc(13% + 1px), transparent 0) 30% 0% / 40% 100%,
    repeating-linear-gradient(transparent 0 7%, #ffffff0a 0 calc(7% + 1px), transparent 0) 70% 0% / 33% 100%,
    repeating-linear-gradient(transparent 0 11%, #ffffff08 0 calc(11% + 1px), transparent 0) -10% 0% / 35% 100%,
    repeating-linear-gradient(transparent 0 17%, #ffffff11 0 calc(17% + 1px), transparent 0) 110% 0% / 27% 100%,
    repeating-linear-gradient(transparent 0 13%, #00000008 0 calc(13% + 1px), transparent 0) 60% -10% / 33% 100%,
    repeating-linear-gradient(transparent 0 8%, #00000008 0 calc(8% + 1px), transparent 0) 21% 2% / 27% 100%,
    repeating-linear-gradient(transparent 0 8%, #00000002 0 calc(8% + 1px), transparent 0) 31% 7% / 19% 100%,
    repeating-linear-gradient(transparent 0 13%, #00000004 0 calc(13% + 1px), transparent 0) 71% 15% / 19% 100%,
    linear-gradient(-45deg, #767a8088, #b8b8bb88),
    #c4c1c3;
}

fieldset {
  box-sizing: border-box;
  position: relative;
  border: 0;
  padding: 0;
  margin: 0;
  border-radius: 0.5em;
  box-shadow:
    inset 0 -0.1em 0.1em -0.05em #fff2,
    inset 0 0.125em 0.25em #0003,
    inset 0 0.25em 0.25em #0001,
    inset -0.05em -0.1em 0.15em #0003,
    inset 0 -0.05em 0.1em #0002,
    inset 0 0 0 0.4em #c4c1c3;
  gap: 0.5em;
  padding: 0.66em;
  background: linear-gradient(#000 0 0) 50% 50% / 97.5% 97.5% no-repeat;
  display: flex;
  font-size: 1.33rem;
  font-size: clamp(0.25rem, 2.5vmin, 2rem);

  & legend {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    left: -1000in;
  }

  & input {
    --spec: linear-gradient(#0000 0 0);
    --spec-checked: 
      radial-gradient(50% 150% at 0 50%, #0004 6%, #0000 50%),
      radial-gradient(50% 130% at 100% 50%, #0004 10%, #0000 50%)
      ;
    --base:
      radial-gradient(at 20% 20%, #0000, #0003) 0 40% / 110% 120% padding-box,
      linear-gradient(#44444a, #28282f) 0 40% / 110% 120% padding-box,
      linear-gradient(#5b5b61, #28282f 50%, #202028) 0 40% / 110% 120% border-box;
    font-size: inherit;
    appearance: none;
    width: 4em;
    aspect-ratio: 4/3;
    border-radius: 0.15em;
    border: 0.02em solid #0000;
    background: red;
    margin: 0;
    padding: 0;
    position: relative;
    background:
      var(--spec),
      var(--base);
    color: #fff5;
    transform: perspective(30em) translateZ(3em);
    box-shadow: 
      inset 0 0 0.4em #0002,
      0 0 0.15em #0005,
      0.25em 0.15em 0.4em #000c,
      0.2em 0.25em 0.35em #0009;
    z-index: 2;
    transition: all 0.1s;
    
    &:first-of-type {
      --spec-checked: radial-gradient(50% 100% at 100% 50%, #0004 10%, #0000 50%);
    }
    
    &:last-of-type {
      --spec-checked: radial-gradient(50% 100% at 0% 50%, #0004 10%, #0000 50%);
    }

    &:checked {
      background:
        var(--spec-checked),
        var(--base);
      transform: perspective(30em) translateZ(0em);
      z-index: 1;
      box-shadow:
        inset 0 0 1em #0004,
        0 0 0 #0000,
        0 0 0 #0000,
        0.125em 0.125em 1em #0005;
    }

    &::before {
      content: attr(value);
      
      transform: translate(-50%, -50%);
      font-size: 0.6em;
      left: 50%;
      top: 64%;
      position: absolute;
      text-transform: uppercase;
      font-weight: 600;
      font-family: Arial, Helvetica, sans-serif;
    }
    
    &::after {
      content: "";
      position: absolute;
      top: 36%;
      left: 50%;
      width: 0.75em;
      height: 0.6em;
      background: currentcolor;
      transform: translate(-50%, -50%);
    }

    &[value="rec"] {
      color: #b44a;

      &::after {
        width: 0.6em;
        border-radius: 50%;
        background: currentcolor;
      }
    }

    &[value="rew"] {
      &::after {
        clip-path: polygon(0 50%, 50% 0, 50% 45%, 100% 0, 100% 100%, 50% 55%, 50% 100%);
      }
    }
    
    &[value="play"] {
      &::after {
        width: 0.66em;
        clip-path: polygon(100% 50%, 0% 0, 0% 100%);
      }
    }
    
    &[value="ffwd"] {
      &::after {
        clip-path: polygon(100% 50%, 50% 0, 50% 45%, 0% 0, 0% 100%, 50% 55%, 50% 100%);
      }
    }
    
    &[value="stop"] {
      &::after {
        width: 0.6em;
      }
    }
    
    &[value="pause"] {
      &::after {
        width: 0.55em;
        background: linear-gradient(90deg, currentcolor 37%, #0000 0 63%, currentcolor 0);
      }
    }
  }
}
</style>
</head>
<body>
<fieldset>
  <legend>Boombox buttons</legend>
  <input  name="buttons" value="Town Taxi"/>
  <input type="radio" name="buttons" />
  <input type="radio" name="buttons" />
  <input type="radio" name="buttons" />
  <input type="radio" name="buttons" />
  <input type="radio" name="buttons" />
</fieldset>
</body>
</html>
